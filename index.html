<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Happy Birthday - Nyi Khine Thwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Myanmar:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4a574;
            --gold-light: #f0d6b8;
            --deep-brown: #2c1f14;
            --warm-bg: #1a1210;
            --accent: #c7925c;
            --note-color: #e8c97b;
            --card-bg: #231b15;
            --text-soft: #c4b5a5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--warm-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Noto Serif Myanmar', 'Times New Roman', serif;
            overflow-x: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fireworks Canvas */
        #fireworksCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 90;
        }

        .bg-particles, .floating-notes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; font-size: 1.6rem; opacity: 0;
            animation: floatUp 7s infinite ease-in;
            pointer-events: none; filter: blur(0.5px);
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.6); }
            8% { opacity: 0.7; } 25% { opacity: 0.55; } 50% { opacity: 0.35; } 75% { opacity: 0.15; }
            100% { opacity: 0; transform: translateY(-105vh) rotate(45deg) scale(1.3); }
        }
        .float-note {
            position: absolute; font-size: 2rem; opacity: 0;
            animation: floatNote 9s infinite ease-in-out;
            color: var(--note-color); text-shadow: 0 0 18px rgba(232,201,123,0.5);
        }
        @keyframes floatNote {
            0% { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg) scale(0.5); }
            10% { opacity: 0.6; } 35% { opacity: 0.4; transform: translateY(-40vh) translateX(30px) rotate(12deg) scale(1); }
            65% { opacity: 0.2; transform: translateY(-70vh) translateX(-20px) rotate(-8deg) scale(0.9); }
            100% { opacity: 0; transform: translateY(-100vh) translateX(10px) rotate(20deg) scale(0.4); }
        }

        /* Envelope (larger tap target) */
        .envelope-container {
            position: relative; z-index: 20; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 40px; /* tap area enlarged */
            transition: opacity 0.5s;
            -webkit-tap-highlight-color: transparent;
        }
        .envelope {
            width: 300px; height: 200px; background: #c9956b;
            border-radius: 8px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s;
        }
        .envelope:hover { transform: scale(1.02); }
        .envelope-flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 100px solid #dba477; border-bottom: 100px solid transparent;
            border-radius: 8px 8px 0 0; transform-origin: top;
            transition: transform 0.6s ease-in-out;
        }
        .envelope.open .envelope-flap { transform: rotateX(180deg); }
        .envelope-body { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; background: #b8845c; border-radius: 0 0 8px 8px; }
        .envelope-hint { margin-top: 18px; color: var(--gold-light); font-size: 1.1rem; animation: gentlePulse 2s infinite; }

        /* Gift Box */
        .gift-box {
            width: 0; height: 0; overflow: visible; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 30; opacity: 0; transition: opacity 0.4s, width 0.4s, height 0.4s;
            pointer-events: none;
        }
        .gift-box.show { width: 260px; height: 180px; opacity: 1; pointer-events: auto; }
        .gift-lid {
            width: 270px; height: 40px; background: #d4a574; border-radius: 6px 6px 0 0;
            position: absolute; top: -10px; left: -5px; transform-origin: left;
            transition: transform 0.6s ease-in-out; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .gift-lid.open { transform: rotate(-130deg) translate(-20px, -20px); }
        .gift-body {
            width: 260px; height: 140px; background: #c9956b; border-radius: 8px;
            position: absolute; bottom: 0; left: 0; box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }
        .gift-ribbon-h, .gift-ribbon-v { position: absolute; background: #f0d6b8; }
        .gift-ribbon-h { width: 100%; height: 12px; top: 50%; left: 0; transform: translateY(-50%); }
        .gift-ribbon-v { width: 12px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
        .gift-bow { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); font-size: 2.5rem; }

        /* Card */
        .card-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.8s 0.5s; pointer-events: none;
            z-index: 40;
        }
        .card-wrapper.reveal { opacity: 1; pointer-events: auto; }

        .card {
            background: var(--card-bg); border-radius: 24px;
            padding: 2rem 1.8rem 2.2rem; max-width: 500px; width: 90%;
            position: relative; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,167,116,0.2), 0 0 80px rgba(200,150,90,0.08), inset 0 0 0 1px rgba(212,167,116,0.25);
            text-align: center; animation: cardEntry 0.8s ease forwards;
        }
        @keyframes cardEntry {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::after {
            content: ''; position: absolute; top: -50%; left: -30%; width: 160%; height: 160%;
            background: radial-gradient(ellipse at center, rgba(200,150,90,0.06) 0%, transparent 60%);
            pointer-events: none; animation: innerGlow 6s ease-in-out infinite;
        }
        @keyframes innerGlow {
            0%,100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .photo-frame {
            width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 1.2rem;
            padding: 4px; background: linear-gradient(135deg, var(--gold), var(--accent), var(--gold-light));
            box-shadow: 0 6px 20px rgba(180,130,80,0.4); animation: frameShine 3s infinite;
        }
        @keyframes frameShine {
            0%,100% { box-shadow: 0 6px 20px rgba(180,130,80,0.4); }
            50% { box-shadow: 0 6px 30px rgba(200,150,90,0.6); }
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid var(--deep-brown); }

        .birthday-label {
            display: inline-block; font-size: 0.8rem; letter-spacing: 0.1em;
            color: var(--accent); border: 1px solid rgba(200,150,90,0.5);
            padding: 0.3rem 1rem; border-radius: 50px; margin-bottom: 0.8rem;
            background: rgba(200,150,90,0.08);
        }

        .mentor-name {
            font-size: 1.8rem; font-weight: 700; color: var(--gold-light);
            margin-bottom: 0.5rem; opacity: 0; animation: fadeInName 1s ease forwards;
        }
        @keyframes fadeInName {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .message { color: var(--text-soft); font-size: 0.95rem; line-height: 1.8; margin-bottom: 0.4rem; min-height: 3em; }
        .quote { font-style: italic; color: var(--accent); font-size: 0.85rem; margin-bottom: 1rem; opacity: 0.8; }

        .play-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(200,150,90,0.15); border: 1px solid rgba(212,167,116,0.5);
            color: var(--gold-light); padding: 0.6rem 1.4rem; border-radius: 50px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.3s; margin-top: 0.4rem;
        }
        .play-btn.playing { background: rgba(200,150,90,0.3); animation: btnPulse 1.2s infinite; }
        @keyframes btnPulse {
            0%,100% { box-shadow: 0 0 15px rgba(200,150,90,0.3); }
            50% { box-shadow: 0 0 30px rgba(200,150,90,0.5); }
        }
        .small-note { font-size: 0.75rem; color: rgba(196,181,165,0.6); margin-top: 0.4rem; }
        .share-btn { display: inline-block; margin-top: 0.8rem; color: var(--gold); text-decoration: none; font-size: 0.75rem; border-bottom: 1px dotted var(--gold); }
        .signature { margin-top: 1rem; font-size: 0.9rem; color: var(--accent); font-style: italic; }

        .hidden-note {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(35,27,21,0.9); border: 1px solid var(--accent);
            color: var(--gold-light); padding: 0.8rem 1.8rem; border-radius: 30px;
            opacity: 0; transition: opacity 0.6s; z-index: 200; pointer-events: none;
            font-size: 0.9rem;
        }
        .hidden-note.show { opacity: 1; }

        .confetti-burst { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .confetti-piece { position: absolute; width: 8px; height: 8px; animation: confettiFall 3s ease-out forwards; opacity: 0; }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-100px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(105vh) rotate(720deg); }
        }
    </style>
</head>

                <div class="birthday-label">🎂 Happy Birthday 🎂</div>
                <h1 class="mentor-name" id="mentorName">Nyi Khine Thwe</h1>
                <p class="message" id="typewriterMessage"></p>
                <p class="quote">“အစိ့ တိုင်းကို အပင်ပေါက်လာဖို့ အခွင့်ရီးပီးဟလို့  ‌ကျေးဇူးပါ ဆရာ”</p>

                <button class="play-btn" id="playBtn" onclick="toggleBirthdaySong()">
                    <span>🎵</span> မွီးနိ တေးခင်းဖွင့်မယ်
                </button>
                <p class="small-note">ဆရာ အတွက် အထူး တီးခတ်ထားရေ မွီးနိ သံစဉ်ချေပါ</p>
                <a href="#" class="share-btn" id="facebookShare">ဆရာ့မွေးနိ Postကို Shareဖို့</a>

    <!-- Hidden Note -->
    <div class="hidden-note" id="hiddenNote">အရာရာ တိုင်း အတွက် ကျေးဇူးပါ ဆရာ</div>

    <script>
        // ── Background particles & notes ──
        (function(){
            const c=document.getElementById('bgParticles');
            const s=['✦','·','♫','♪','✧','•','♩'];
            for(let i=0;i<30;i++){
                const sp=document.createElement('span'); sp.className='particle';
                sp.textContent=s[Math.floor(Math.random()*s.length)];
                sp.style.left=Math.random()*94+'%'; sp.style.top=(60+Math.random()*40)+'%';
                sp.style.animationDelay=Math.random()*7+'s';
                sp.style.animationDuration=(5+Math.random()*8)+'s';
                sp.style.color=Math.random()<0.5?'rgba(232,201,123,0.5)':'rgba(240,214,184,0.4)';
                c.appendChild(sp);
            }
            const n=document.getElementById('floatingNotes');
            const notes=['♫','♪','♩','♬','𝄞','♭'];
            for(let i=0;i<12;i++){
                const sp=document.createElement('span'); sp.className='float-note';
                sp.textContent=notes[Math.floor(Math.random()*notes.length)];
                sp.style.left=(5+Math.random()*88)+'%'; sp.style.top=(50+Math.random()*50)+'%';
                sp.style.animationDelay=Math.random()*9+'s';
                sp.style.animationDuration=(7+Math.random()*10)+'s';
                n.appendChild(sp);
            }
        })();

        // ── Audio (pre‑activate on user tap) ──
        let audioCtx=null, isPlaying=false, currentTimeoutIds=[];
        const noteFreqs={'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392,'A4':440,'Bb4':466.16,'C5':523.25,'rest':0};
        const melody=[['C4',350],['C4',350],['D4',700],['C4',700],['F4',700],['E4',1400],['C4',350],['C4',350],['D4',700],['C4',700],['G4',700],['F4',1400],['C4',350],['C4',350],['C5',700],['A4',700],['F4',700],['E4',700],['D4',1400],['Bb4',350],['Bb4',350],['A4',700],['F4',700],['G4',700],['F4',1600]];

        function getAudioContext(){
            if(!audioCtx){
                audioCtx=new(window.AudioContext||window.webkitAudioContext)();
                if(audioCtx.state==='suspended') audioCtx.resume();
            }
            return audioCtx;
        }
        function playNote(freq,dur,start){
            const ctx=getAudioContext(); if(freq===0)return;
            const o=ctx.createOscillator(),g=ctx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(freq,start);
            g.gain.setValueAtTime(0,start); g.gain.linearRampToValueAtTime(0.45,start+0.03);
            g.gain.linearRampToValueAtTime(0.3,start+dur/1000-0.1); g.gain.linearRampToValueAtTime(0,start+dur/1000);
            o.connect(g); g.connect(ctx.destination); o.start(start); o.stop(start+dur/1000+0.02);
        }
        function scheduleMelody(start){let t=0; melody.forEach(([n,d])=>{if(noteFreqs[n]>0)playNote(noteFreqs[n],d,start+t/1000); t+=d;}); return t;}

        function stopAll(){currentTimeoutIds.forEach(id=>clearTimeout(id)); currentTimeoutIds=[]; if(audioCtx){audioCtx.close(); audioCtx=null;}}

        // ── Fireworks ──
        const canvas=document.getElementById('fireworksCanvas'), ctxF=canvas.getContext('2d');
        let fireworks=[],animId=null;
        function resizeCanvas(){canvas.width=window.innerWidth; canvas.height=window.innerHeight;}
        window.addEventListener('resize',resizeCanvas); window.addEventListener('orientationchange',resizeCanvas); resizeCanvas();
        class FireworkParticle{
            constructor(x,y,color){this.x=x;this.y=y;const a=Math.random()*Math.PI*2,s=Math.random()*4+2;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;this.color=color;this.alpha=1;this.decay=0.015;this.size=Math.random()*3+1;}
            update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.04;this.alpha-=this.decay;return this.alpha>0;}
            draw(){ctxF.save();ctxF.globalAlpha=this.alpha;ctxF.fillStyle=this.color;ctxF.beginPath();ctxF.arc(this.x,this.y,this.size,0,Math.PI*2);ctxF.fill();ctxF.restore();}
        }
        function createFirework(x,y){const col=['#FFD700','#FFA500','#FF69B4','#00CED1','#ADFF2F'][Math.floor(Math.random()*5)];for(let i=0;i<25;i++)fireworks.push(new FireworkParticle(x,y,col));}
        function animateFireworks(){
            ctxF.clearRect(0,0,canvas.width,canvas.height);
            fireworks=fireworks.filter(p=>p.update());
            fireworks.forEach(p=>p.draw());
            if(fireworks.length===0&&!isPlaying)animId=null; else animId=requestAnimationFrame(animateFireworks);
        }
        function startFireworks(){if(animId)return; for(let i=0;i<3;i++)setTimeout(()=>{const x=Math.random()*canvas.width*0.7+canvas.width*0.15,y=Math.random()*canvas.height*0.4+canvas.height*0.1; createFirework(x,y);},i*200); animateFireworks();}

        function triggerConfetti(){
            const cont=document.getElementById('confettiContainer');
            const cols=['#d4a574','#f0d6b8','#e8c97b','#ffd700'];
            for(let i=0;i<35;i++){
                const p=document.createElement('div'); p.className='confetti-piece';
                p.style.left=Math.random()*96+'%'; p.style.top=-(Math.random()*40)+'px';
                p.style.width=(6+Math.random()*10)+'px'; p.style.height=(6+Math.random()*10)+'px';
                p.style.backgroundColor=cols[Math.floor(Math.random()*cols.length)];
                p.style.animationDelay=Math.random()*0.5+'s';
                p.style.animationDuration=(2.5+Math.random()*3)+'s';
                cont.appendChild(p); setTimeout(()=>{if(p.parentNode)p.remove();},3500);
            }
        }

        function showHiddenNote(){
            const note=document.getElementById('hiddenNote'); note.classList.add('show');
            setTimeout(()=>note.classList.remove('show'),4000);
        }

        async function toggleBirthdaySong(){
            const btn=document.getElementById('playBtn');
            if(isPlaying){
                stopAll(); isPlaying=false; btn.classList.remove('playing');
                btn.innerHTML='<span>🎵</span> မွီးနိ တေးခင်းဖွင့်မယ်'; return;
            }
            try{
                const ctx=getAudioContext(); const now=ctx.currentTime;
                const total=scheduleMelody(now);
                isPlaying=true; btn.classList.add('playing');
                btn.innerHTML='<span>🎵</span> ဖွင့်နီသည်...';
                triggerConfetti(); startFireworks();
                const stopId=setTimeout(()=>{
                    isPlaying=false; btn.classList.remove('playing');
                    btn.innerHTML='<span>🎵</span> မွီးနိ တေးခင်းဖွင့်မယ်';
                    if(audioCtx){audioCtx.close();audioCtx=null;}
                    showHiddenNote();
                },total+600);
                currentTimeoutIds.push(stopId);
            }catch(e){
                isPlaying=false; btn.classList.remove('playing');
                btn.innerHTML='<span>🎵</span> မွီးနိ တေးခင်းဖွင့်မယ်';
            }
        }

        function typewriter(element, lines, speed=40, callback){
            let lineIndex = 0, charIndex = 0;
            element.innerHTML = '';
            function typeLine(){
                if(lineIndex < lines.length){
                    if(charIndex < lines[lineIndex].length){
                        element.innerHTML += lines[lineIndex].charAt(charIndex);
                        charIndex++;
                        setTimeout(typeLine, speed);
                    } else {
                        if(lineIndex < lines.length - 1) element.innerHTML += '<br>';
                        lineIndex++; charIndex = 0;
                        setTimeout(typeLine, speed);
                    }
                } else { if(callback) callback(); }
            }
            typeLine();
        }

        // ── Envelope tap handler (iOS/Telegram support) ──
        let envelopeOpened = false;
        function openEnvelope() {
            if(envelopeOpened) return;
            envelopeOpened = true;
            // Activate audio context early
            getAudioContext();
            const envelope=document.getElementById('envelope');
            envelope.classList.add('open');
            setTimeout(()=>{
                document.getElementById('envelopeContainer').style.opacity='0';
                const giftBox=document.getElementById('giftBox'); giftBox.classList.add('show');
                setTimeout(()=>{
                    document.getElementById('giftLid').classList.add('open');
                    setTimeout(()=>{
                        document.getElementById('cardWrapper').classList.add('reveal');
                        const msgLines = [
                            "မင်္ဂလာဟိရေ မွီးနိချေ ဖြစ်ပါစီ ဆရာ။",
                            "ဆရာ့ အားပီးမှုတိ နဲ့ နားလည်ပီးမှုတိ က ကျွန်တော်ရို့ အတွက် ခွန်အားတခုပါ။",
                            "ဒေနှစ်စွာ ဆရာ အတွက် ပိုပြီးကေ လှပရေ နှစ်တနှစ်ဖြစ်ပါစီဆရာ။"
                        ];
                        typewriter(document.getElementById('typewriterMessage'), msgLines, 30);
                    },600);
                },500);
            },700);
        }

        // Attach both click and touchstart for iOS (especially Telegram in-app browser)
        const envelopeContainer = document.getElementById('envelopeContainer');
        envelopeContainer.addEventListener('click', openEnvelope);
        envelopeContainer.addEventListener('touchstart', function(e) {
            // Prevent double fire with click on some devices
            e.preventDefault();
            openEnvelope();
        }, {passive: false});

        // Facebook Share
        document.getElementById('facebookShare').addEventListener('click',function(e){
            e.preventDefault();
            const msg=encodeURIComponent('Happy Birthday Nyi Khine Thwe! 🎂🎵');
            const url=encodeURIComponent(window.location.href);
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${msg}`,'_blank','width=600,height=400');
        });

        // Light confetti after card reveal
        setTimeout(()=>{ if(document.getElementById('cardWrapper').classList.contains('reveal')) triggerConfetti(); },2000);
    </script>
